name: Daily Train & Signal

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-infer:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "numpy<2"
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu 
          pip install scikit-learn==1.4.2 huggingface_hub==0.23.0
          pip install pandas==2.2.2 pyarrow==16.0.0 requests==2.31.0

      - name: Walk-forward training (both modes)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python train.py --hf_token "$HF_TOKEN" --mode both

      - name: Generate signal
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python infer.py --hf_token "$HF_TOKEN"

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json walk_forward_results.json model_expanding.pt model_fixed.pt || true
          git diff --cached --quiet || git commit -m "chore: daily walk-forward update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main  # <-- ADD THIS LINE
          git push
