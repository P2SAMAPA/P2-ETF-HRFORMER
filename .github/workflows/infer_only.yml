name: Generate ETF Signal (Inference Only)

on:
  # Run on schedule (e.g., daily after market close at 6 PM UTC)
  schedule:
    - cron: '0 18 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main (optional - remove if you only want scheduled)
  push:
    branches: [main]
    paths:
      - 'infer.py'
      - 'data_utils.py'
      - 'hrformer.py'
      - '.github/workflows/infer_only.yml'

jobs:
  infer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download model files from HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'EOF'
          from huggingface_hub import hf_hub_download
          import os
          
          token = os.environ.get("HF_TOKEN")
          repo_id = "P2SAMAPA/etf-hrformer-model"
          
          # Download both model files and walk-forward results (expanding + shrinking)
          files_to_download = [
              "model_expanding.pt",
              "model_shrinking.pt",                     # replaced fixed with shrinking
              "walk_forward_results_expanding.json",
              "walk_forward_results_shrinking.json"      # replaced fixed with shrinking
          ]
          
          for filename in files_to_download:
              try:
                  local_path = hf_hub_download(
                      repo_id=repo_id,
                      filename=filename,
                      repo_type="model",
                      token=token
                  )
                  print(f"✓ Downloaded {filename}")
              except Exception as e:
                  print(f"✗ Failed to download {filename}: {e}")
                  # Don't fail if one model is missing - infer.py will handle it
          EOF
      
      - name: Run inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Starting inference..."
          python infer.py --hf_token "$HF_TOKEN"
          echo "Inference complete"
      
      - name: Verify output
        run: |
          if [ -f "latest.json" ]; then
            echo "✓ latest.json generated successfully"
            cat latest.json | head -20
          else
            echo "✗ latest.json not found!"
            exit 1
          fi
      
      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'EOF'
          from huggingface_hub import HfApi
          import os
          
          token = os.environ.get("HF_TOKEN")
          api = HfApi(token=token)
          
          try:
              api.upload_file(
                  path_or_fileobj="latest.json",
                  path_in_repo="latest.json",
                  repo_id="P2SAMAPA/etf-hrformer-model",
                  repo_type="model"
              )
              print("✓ Pushed latest.json to HF Hub")
          except Exception as e:
              print(f"✗ Upload failed: {e}")
              raise
          EOF
      
      - name: Summary
        run: |
          echo "=== Inference Summary ==="
          python << 'EOF'
          import json
          try:
              with open("latest.json", "r") as f:
                  data = json.load(f)
              
              print(f"Generated at: {data.get('generated_at', 'N/A')}")
              print(f"Best mode: {data.get('best_mode', 'N/A')}")
              
              signal = data.get('signal', {})
              print(f"Recommended ETF: {signal.get('recommended_etf', 'N/A')}")
              print(f"Predicted return: {signal.get('predicted_return', 0)*100:+.2f}%")
              print(f"Entry: {signal.get('signal_date', 'N/A')}")
              print(f"Exit: {signal.get('hold_until', 'N/A')}")
              
              perf = data.get('performance', {})
              print(f"\nPerformance (best mode):")
              print(f"  Ann. Return: {perf.get('annualised_return', 0)*100:+.2f}%")
              print(f"  Sharpe: {perf.get('sharpe_ratio', 0):.2f}")
              
              # Show comparison if available
              comparison = data.get('mode_comparison', {})
              if comparison:
                  print(f"\nMode Comparison:")
                  for mode, metrics in comparison.items():
                      ret = metrics.get('annualised_return', 0) * 100
                      sharpe = metrics.get('sharpe_ratio', 0)
                      print(f"  {mode}: {ret:+.2f}% return, {sharpe:.2f} Sharpe")
          except Exception as e:
              print(f"Error reading summary: {e}")
          EOF
